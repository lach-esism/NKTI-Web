<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NKTI 测评结果</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="result-body">
  <div class="page-shell result-shell">
    <div class="result-actions-top">
      <a class="ghost-btn link-btn" href="./index.html">返回测评</a>
      <button id="copyLinkBtn" class="ghost-btn" type="button">复制分享链接</button>
      <button id="shareBtn" class="primary-btn" type="button">分享结果</button>
    </div>

    <div id="resultCard" class="result-card">
      <div class="result-badge">NKTI RESULT</div>
      <h1 id="resultName" class="result-name">人格结果加载中</h1>
      <p id="resultEnName" class="result-en-name">PERSONALITY</p>
      <div class="result-image-wrap">
        <img id="resultImage" class="result-image" alt="人格结果图片">
      </div>
      <p id="resultHighlight" class="result-highlight"></p>
      <p id="resultComment" class="result-comment"></p>
    </div>

    <div class="result-bottom-actions">
      <button id="downloadImageBtn" class="primary-btn" type="button">下载结果图片</button>
      <button id="copyLinkBtnBottom" class="ghost-btn" type="button">复制链接</button>
    </div>

    <p id="resultStatus" class="share-status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script type="module" src="./result.js"></script>
</body>
</html>
